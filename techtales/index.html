<!DOCTYPE html>
<meta charset="UTF-8">
<title>Redirecting…</title>
<script>
(function () {
    var dest = 'https://blog.curioustorvald.com/';
    var params = {};
    if (location.search) {
        location.search.substr(1).split('&').forEach(function (item) {
            var kv = item.split('=');
            params[kv[0]] = kv[1] ? decodeURIComponent(kv[1]) : '';
        });
    }
    if (params.a) {
        var match = params.a.match(/^[^_]+_\d+_(.+)$/);
        if (match) {
            dest = 'https://blog.curioustorvald.com/' + match[1] + '.html';
        }
    }
    location.replace(dest);
})();
</script>
<meta http-equiv="refresh" content="0; url=https://blog.curioustorvald.com/">
<p>Redirecting to <a href="https://blog.curioustorvald.com/">blog.curioustorvald.com</a>…</p>
